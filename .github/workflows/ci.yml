name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Lint: check code formatting and style with ruff
  # ---------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  # ---------------------------------------------------------------
  # Unit Tests: fast tests with no external dependencies
  # ---------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync --group test
          uv pip install -e .

      - name: Run unit tests with coverage
        run: uv run pytest -m unit --cov=pfin_back_etl --cov-report=term-missing

  # ---------------------------------------------------------------
  # Integration Tests: run locally with `uv run pytest -m integration`
  # Requires .env with valid DB + API credentials.
  # Not run in CI to avoid writing to the production database.
  # ---------------------------------------------------------------
